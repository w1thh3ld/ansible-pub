---
# switch-backup.yml
# Pulls running configs from network switches (Cisco IOS/NX-OS/IOS-XR, Arista,
# Juniper Junos, Aruba AOS-CX, Aruba/HP Procurve, Dell OS10, HP Comware, …)
# and uploads each one to a private S3 bucket with server-side encryption.
#
# Switch credentials and S3 keys both live OUTSIDE this playbook — see the
# "Where credentials come from" block below.
#
# Usage:
#   ansible-playbook -i inventory.ini switch-backup.yml --ask-vault-pass
#   ansible-playbook -i inventory.ini switch-backup.yml --limit cisco_ios
#   ansible-playbook -i inventory.ini switch-backup.yml --check --diff
#
# Tags:
#   fetch    — only pull configs from the switches
#   upload   — only upload already-fetched configs to S3
#   cleanup  — only delete the local working copy after upload
#
# Requirements on the control node:
#   ansible-galaxy collection install \
#     amazon.aws ansible.netcommon \
#     cisco.ios cisco.nxos cisco.iosxr \
#     arista.eos junipernetworks.junos \
#     arubanetworks.aoscx dellemc.os10 community.network
#   pip install boto3 botocore paramiko ncclient
#
# Where credentials come from:
#
#   AWS S3 (env var → vault var):
#     $AWS_ACCESS_KEY_ID         or  vault_aws_access_key
#     $AWS_SECRET_ACCESS_KEY     or  vault_aws_secret_key
#     $AWS_SESSION_TOKEN         or  vault_aws_session_token   (optional)
#
#   Per-switch SSH login (set in inventory or vault):
#     ansible_user
#     ansible_password           — vault it: ansible_password={{ vault_switch_password }}
#     ansible_become_password    — Cisco "enable" secret, vault it
#     ansible_ssh_private_key_file — optional, key-based auth
#
#   Vault file (encrypted):
#     ansible-vault create group_vars/switches/vault.yml
#   Then put:
#     vault_aws_access_key: AKIA...
#     vault_aws_secret_key: ...
#     vault_switch_password: ...
#     vault_switch_enable_password: ...
#
# How to tag each switch with its OS family in inventory:
#   Set ansible_network_os per host or per group. Common values:
#     cisco.ios.ios                Cisco IOS / IOS-XE Catalyst & ISR
#     cisco.nxos.nxos              Cisco Nexus
#     cisco.iosxr.iosxr            Cisco IOS-XR
#     arista.eos.eos               Arista EOS
#     junipernetworks.junos.junos  Juniper Junos (EX/QFX/SRX/MX)
#     arubanetworks.aoscx.aoscx    Aruba AOS-CX
#     community.network.aos        Aruba/HP Procurve (AOS-Switch)
#     dellemc.os10.os10            Dell OS10
#     community.network.ce         HP Comware (Huawei-derived)

- name: Backup network switch configs to S3
  hosts: switches
  gather_facts: false

  vars:
    # ----------------------------------------------------------------------
    # S3 destination
    # ----------------------------------------------------------------------
    s3_bucket: "msp-switch-backups"           # change me
    s3_region: "ap-southeast-2"               # change me
    s3_key_prefix: "switches"                 # objects land at <prefix>/<hostname>/<date>/...
    s3_encryption: "AES256"                   # "AES256" (SSE-S3) or "aws:kms"
    s3_kms_key_id: ""                         # only needed when s3_encryption == "aws:kms"

    # ----------------------------------------------------------------------
    # Per-OS "show running" commands. Override per-host with `show_running_cmd`
    # in inventory if a particular box needs something different.
    # ----------------------------------------------------------------------
    show_running_cmd_map:
      cisco.ios.ios:                 "show running-config"
      cisco.nxos.nxos:               "show running-config"
      cisco.iosxr.iosxr:             "show running-config"
      arista.eos.eos:                "show running-config"
      junipernetworks.junos.junos:   "show configuration | display set | no-more"
      arubanetworks.aoscx.aoscx:     "show running-config"
      community.network.aos:         "show running-config"
      dellemc.os10.os10:             "show running-configuration"
      community.network.ce:          "display current-configuration"
    show_running_cmd: "{{ show_running_cmd_map[ansible_network_os] | default('show running-config') }}"

    # ----------------------------------------------------------------------
    # Local staging
    # ----------------------------------------------------------------------
    backup_dir: "/var/tmp/switch-backups"
    delete_local_after_upload: true
    timestamp: "{{ ansible_date_time.iso8601_basic_short | default(lookup('pipe','date -u +%Y%m%dT%H%M%SZ')) }}"
    backup_filename: "{{ inventory_hostname }}-{{ timestamp }}.cfg"
    backup_local_path: "{{ backup_dir }}/{{ backup_filename }}"
    s3_object_key: "{{ s3_key_prefix }}/{{ inventory_hostname }}/{{ timestamp[:8] }}/{{ backup_filename }}"

    # ----------------------------------------------------------------------
    # AWS credentials — env var first, then vault. Never hardcoded here.
    # ----------------------------------------------------------------------
    aws_access_key: "{{ lookup('env', 'AWS_ACCESS_KEY_ID') | default(vault_aws_access_key | default(''), true) }}"
    aws_secret_key: "{{ lookup('env', 'AWS_SECRET_ACCESS_KEY') | default(vault_aws_secret_key | default(''), true) }}"
    aws_session_token: "{{ lookup('env', 'AWS_SESSION_TOKEN') | default(vault_aws_session_token | default(''), true) }}"

  pre_tasks:
    - name: Refuse to run without AWS credentials
      ansible.builtin.assert:
        that:
          - aws_access_key | length > 0
          - aws_secret_key | length > 0
        fail_msg: >-
          AWS credentials not found. Export AWS_ACCESS_KEY_ID +
          AWS_SECRET_ACCESS_KEY, or define vault_aws_access_key /
          vault_aws_secret_key in an encrypted vault file.
      run_once: true
      delegate_to: localhost
      tags: [always]

    - name: Refuse to run without ansible_network_os set
      ansible.builtin.assert:
        that:
          - ansible_network_os is defined
          - ansible_network_os | length > 0
        fail_msg: >-
          ansible_network_os is not set for {{ inventory_hostname }}. Add it
          to inventory (per host or per group) — see playbook header for the
          list of supported values.
      tags: [always]

    - name: Ensure local staging directory exists
      ansible.builtin.file:
        path: "{{ backup_dir }}"
        state: directory
        mode: "0700"
      delegate_to: localhost
      run_once: true
      tags: [always]

    - name: Gather a timestamp on the control node
      ansible.builtin.setup:
        gather_subset: ['min']
      delegate_to: localhost
      tags: [always]

  tasks:
    # ============================================================== fetch
    - name: Run "{{ show_running_cmd }}" on {{ inventory_hostname }} ({{ ansible_network_os }})
      ansible.netcommon.cli_command:
        command: "{{ show_running_cmd }}"
      register: running_cfg
      tags: [fetch]

    - name: Sanity check the captured output is non-empty
      ansible.builtin.assert:
        that:
          - running_cfg.stdout is defined
          - (running_cfg.stdout | length) > 100
        fail_msg: >-
          Captured config from {{ inventory_hostname }} looks empty or too
          short ({{ (running_cfg.stdout | default('') | length) }} bytes).
          Check credentials, the show command, or device pagination.
      tags: [fetch]

    - name: Save running config to local staging file
      ansible.builtin.copy:
        content: |
          ! ============================================================
          ! Backup of {{ inventory_hostname }} ({{ ansible_host | default(inventory_hostname) }})
          ! OS: {{ ansible_network_os }}
          ! Captured: {{ timestamp }} (UTC) by Ansible
          ! Command: {{ show_running_cmd }}
          ! ============================================================
          {{ running_cfg.stdout }}
        dest: "{{ backup_local_path }}"
        mode: "0600"
      delegate_to: localhost
      tags: [fetch]

    # ============================================================== upload
    - name: Upload {{ backup_filename }} to s3://{{ s3_bucket }}/{{ s3_object_key }}
      amazon.aws.s3_object:
        bucket: "{{ s3_bucket }}"
        object: "{{ s3_object_key }}"
        src: "{{ backup_local_path }}"
        mode: put
        region: "{{ s3_region }}"
        encrypt: true
        encryption_mode: "{{ s3_encryption }}"
        encryption_kms_key_id: "{{ s3_kms_key_id | default(omit, true) }}"
        access_key: "{{ aws_access_key }}"
        secret_key: "{{ aws_secret_key }}"
        session_token: "{{ aws_session_token | default(omit, true) }}"
        permission: private
        tags:
          source: "switch-backup-playbook"
          switch: "{{ inventory_hostname }}"
          network_os: "{{ ansible_network_os }}"
          taken_at: "{{ timestamp }}"
      delegate_to: localhost
      no_log: true                   # AWS keys are in the args — keep them out of logs
      register: s3_upload
      tags: [upload]

    - name: Confirm the object now exists in S3
      amazon.aws.s3_object_info:
        bucket_name: "{{ s3_bucket }}"
        object_name: "{{ s3_object_key }}"
        region: "{{ s3_region }}"
        access_key: "{{ aws_access_key }}"
        secret_key: "{{ aws_secret_key }}"
        session_token: "{{ aws_session_token | default(omit, true) }}"
      delegate_to: localhost
      no_log: true
      register: s3_verify
      tags: [upload]

    # ============================================================== cleanup
    - name: Remove local copy after successful upload
      ansible.builtin.file:
        path: "{{ backup_local_path }}"
        state: absent
      delegate_to: localhost
      when: delete_local_after_upload | bool
      tags: [cleanup]

    # ============================================================== summary
    - name: Per-switch summary
      ansible.builtin.debug:
        msg:
          - "Switch: {{ inventory_hostname }} ({{ ansible_host | default(inventory_hostname) }})"
          - "OS family: {{ ansible_network_os }}"
          - "Bytes captured: {{ running_cfg.stdout | length }}"
          - "S3 location: s3://{{ s3_bucket }}/{{ s3_object_key }}"
          - "Object size: {{ (s3_verify.object_info[0].object_data.content_length | default('?')) }} bytes"
          - "Encryption: {{ s3_encryption }}{{ ' / ' + s3_kms_key_id if s3_encryption == 'aws:kms' else '' }}"
          - "Local copy retained: {{ not (delete_local_after_upload | bool) }}{{ ' — ' + backup_local_path if not (delete_local_after_upload | bool) else '' }}"
      tags: [always]
