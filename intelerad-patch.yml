---
# intelerad-patch.yml
# OS patching for IntelePACS servers running RHEL 8 or Rocky Linux 8.
#
# What this playbook does (in order):
#   1.  Pre-flight: assert supported OS (RHEL 8 / Rocky 8), prep log dir.
#   2.  Boot-partition check; remove old kernels (keep 3) if /boot > 70%.
#   3.  Build the per-OS REPOS filter and the SKIP filter that excludes
#       corosync* and pacemaker* — these MUST NEVER be updated.
#   4.  Confirm the package list that *will* be updated and the excluded
#       list, both written to the run log.
#   5.  Capture pre-update PACS status (reportPacsStatus) as the baseline.
#   6.  Stop PACS services gracefully in the documented order.
#   7.  Run `yum ${REPOS} ${SKIP} update` with the log captured.
#   8.  Reboot.
#   9.  Re-run reportPacsStatus immediately after the host comes back,
#       diff against the baseline, and flag any differences.
#   10. Wait 5 minutes, run reportPacsStatus again, diff against the
#       baseline, and flag any remaining differences. Then run
#       checkRestarts. If PACS still differs/fails, run the documented
#       force-start as a recovery.
#
# Tags:
#   prep      — pre-flight, boot cleanup
#   repos     — build REPOS / SKIP, write check-update report
#   stop      — stop PACS stack
#   upgrade   — run yum update
#   reboot    — reboot the host
#   verify    — post-reboot PACS status / checkRestarts
#   recover   — force-start PACS stack (only on failure)
#
# Usage:
#   ansible-playbook -i inventory.ini intelerad-patch.yml
#   ansible-playbook -i inventory.ini intelerad-patch.yml --check --diff
#   ansible-playbook -i inventory.ini intelerad-patch.yml --tags verify

- name: Patch an IntelePACS server (RHEL 8 / Rocky 8)
  hosts: intelerad
  become: true
  gather_facts: true
  serial: 1                        # patch one PACS server at a time
  any_errors_fatal: true

  vars:
    # ----------------------------------------------------------------------
    # Packages that must NEVER be touched by yum during a PACS patch run.
    # Add to this list, never remove from it without Intelerad's say-so.
    # ----------------------------------------------------------------------
    intelerad_excluded_packages:
      - "corosync*"
      - "pacemaker*"

    # ----------------------------------------------------------------------
    # Per-OS repo filters. Only RHEL 8 and Rocky 8 are supported.
    # ----------------------------------------------------------------------
    intelerad_repos_map:
      RedHat-8: >-
        --disablerepo=* --enablerepo=rhel-8-for-x86_64-baseos-rpms
        --enablerepo=rhel-8-for-x86_64-appstream-rpms --enablerepo=epel
      Rocky-8: >-
        --disablerepo=* --enablerepo=baseos --enablerepo=appstream
        --enablerepo=extras --enablerepo=epel

    # Operational toggles
    auto_reboot: true                    # the guide always reboots
    boot_partition_threshold_percent: 70 # cleanup older kernels above this
    keep_kernel_count: 3
    post_reboot_settle_seconds: 300      # wait 5 min after reboot before 2nd check
    reboot_timeout: 900

    log_dir: /var/log/ansible-patching
    log_file: "{{ log_dir }}/intelerad-patch-{{ ansible_date_time.iso8601_basic_short }}.log"
    pacs_status_baseline_file: "{{ log_dir }}/pacs-status-pre.log"
    pacs_status_post_reboot_file: "{{ log_dir }}/pacs-status-post-reboot.log"
    pacs_status_post_settle_file: "{{ log_dir }}/pacs-status-post-5min.log"

  pre_tasks:
    # ---------------------------------------------------------------- prep --
    - name: Assert this is a supported Intelerad OS
      ansible.builtin.assert:
        that:
          - "(ansible_facts['distribution'] ~ '-' ~ ansible_facts['distribution_major_version']) in intelerad_repos_map.keys() | list"
        fail_msg: >-
          Unsupported OS for Intelerad patching:
          {{ ansible_facts['distribution'] }} {{ ansible_facts['distribution_version'] }}.
          Supported: RHEL 8, Rocky Linux 8.
      tags: [always, prep]

    - name: Ensure log directory exists
      ansible.builtin.file:
        path: "{{ log_dir }}"
        state: directory
        owner: root
        group: root
        mode: "0750"
      tags: [always]

    - name: Build the OS key for repo lookup
      ansible.builtin.set_fact:
        intelerad_os_key: "{{ ansible_facts['distribution'] }}-{{ ansible_facts['distribution_major_version'] }}"
      tags: [always]

  tasks:
    # ------------------------------------------------------ boot cleanup ----
    - name: Read /boot usage
      ansible.builtin.shell: |
        set -o pipefail
        df --output=pcent /boot | tail -n1 | tr -d ' %'
      args:
        executable: /bin/bash
      register: boot_pct_raw
      changed_when: false
      tags: [prep]

    - name: Set boot_pct fact
      ansible.builtin.set_fact:
        boot_pct: "{{ boot_pct_raw.stdout | int }}"
      tags: [prep]

    - name: Show /boot usage
      ansible.builtin.debug:
        msg: "/boot usage: {{ boot_pct }}% (threshold {{ boot_partition_threshold_percent }}%)"
      tags: [prep]

    - name: Ensure dnf-utils is installed (provides package-cleanup)
      ansible.builtin.dnf:
        name: dnf-utils
        state: present
      tags: [prep]

    - name: Remove older kernels (keep {{ keep_kernel_count }}) if /boot is above threshold
      ansible.builtin.command: "package-cleanup -y --oldkernels --count={{ keep_kernel_count }}"
      when: boot_pct | int >= boot_partition_threshold_percent
      register: kernel_cleanup
      changed_when: "'Removed' in kernel_cleanup.stdout or kernel_cleanup.rc == 0"
      tags: [prep]

    # ------------------------------------------------------- build filters --
    - name: Build REPOS argument string
      ansible.builtin.set_fact:
        intelerad_repos_args: "{{ intelerad_repos_map[intelerad_os_key] }}"
      tags: [repos, upgrade]

    - name: Build SKIP argument string
      ansible.builtin.set_fact:
        intelerad_skip_args: >-
          {{ intelerad_excluded_packages
             | map('regex_replace', '^(.*)$', '--exclude=\\1')
             | join(' ') }}
      tags: [repos, upgrade]

    - name: Show effective yum filter args
      ansible.builtin.debug:
        msg:
          - "REPOS: {{ intelerad_repos_args | trim }}"
          - "SKIP : {{ intelerad_skip_args | trim }}"
      tags: [repos, upgrade]

    # -------------------------------------------- check-update confirmation --
    - name: Run yum check-update — list excluded packages (must include corosync/pacemaker)
      ansible.builtin.shell: |
        set -o pipefail
        {
          echo "=== check-update (excluded) on $(date -Is) ==="
          yum {{ intelerad_repos_args }} {{ intelerad_skip_args }} check-update | grep -i excluded || true
        } 2>&1 | tee -a "{{ log_file }}"
      args:
        executable: /bin/bash
      register: check_excluded
      changed_when: false
      tags: [repos]

    - name: Assert corosync and pacemaker are in the excluded list
      ansible.builtin.assert:
        that:
          - "'corosync' in check_excluded.stdout | lower"
          - "'pacemaker' in check_excluded.stdout | lower"
        fail_msg: >-
          Safety check failed — corosync and/or pacemaker were not reported
          as excluded by yum. Aborting before any updates are applied.
      tags: [repos]

    - name: Run yum check-update — list packages that WILL be updated
      ansible.builtin.shell: |
        set -o pipefail
        {
          echo "=== check-update (to be updated) on $(date -Is) ==="
          yum {{ intelerad_repos_args }} {{ intelerad_skip_args }} check-update | grep -v -i excluded || true
        } 2>&1 | tee -a "{{ log_file }}"
      args:
        executable: /bin/bash
      register: check_to_update
      changed_when: false
      tags: [repos]

    - name: Assert corosync/pacemaker are NOT in the to-be-updated list
      ansible.builtin.assert:
        that:
          - "'corosync' not in (check_to_update.stdout | lower)"
          - "'pacemaker' not in (check_to_update.stdout | lower)"
        fail_msg: >-
          Safety check failed — corosync or pacemaker appear in the list of
          packages that would be updated. Aborting.
      tags: [repos]

    # ---------------------------------------------- pre-update PACS status --
    - name: Capture pre-update PACS status as baseline
      ansible.builtin.shell: |
        set -o pipefail
        sudo -u admin /usr/local/tools/support/reportPacsStatus \
          > "{{ pacs_status_baseline_file }}" 2>&1
        {
          echo "=== reportPacsStatus (pre-update baseline) on $(date -Is) ==="
          cat "{{ pacs_status_baseline_file }}"
        } | tee -a "{{ log_file }}"
      args:
        executable: /bin/bash
      register: pacs_status_before
      changed_when: false
      failed_when: false
      tags: [verify, prep]

    # ------------------------------------------------- stop PACS services ---
    - name: Stop PACS services in the documented order
      ansible.builtin.shell: |
        set -e
        {
          echo "=== Stopping PACS stack on $(date -Is) ==="
          sudo -u admin /usr/local/tools/PACS stop
          sudo -u admin controlTomcat -t stop
          /etc/init.d/postgres-intelerad stop
          /etc/init.d/sybase -v stop
          /etc/init.d/apache2 stop
          echo "=== PACS stack stopped on $(date -Is) ==="
        } 2>&1 | tee -a "{{ log_file }}"
      args:
        executable: /bin/bash
      tags: [stop]

    # -------------------------------------------------------------- update --
    - name: Run yum update with REPOS and SKIP, capture log
      ansible.builtin.shell: |
        set -o pipefail
        {
          echo "=== yum update on $(date -Is) ==="
          yum {{ intelerad_repos_args }} {{ intelerad_skip_args }} -y update
          echo "=== yum update finished $(date -Is) ==="
        } 2>&1 | tee -a "{{ log_file }}"
      args:
        executable: /bin/bash
      register: yum_update
      changed_when: "'No packages marked for update' not in yum_update.stdout and 'Nothing to do' not in yum_update.stdout"
      tags: [upgrade]

    - name: Symlink latest patching log
      ansible.builtin.file:
        src: "{{ log_file | basename }}"
        dest: "{{ log_dir }}/latest.log"
        state: link
        force: true
      tags: [upgrade]

    # -------------------------------------------------------------- reboot --
    - name: Reboot the PACS server
      ansible.builtin.reboot:
        msg: "Reboot triggered by Ansible Intelerad patching playbook"
        reboot_timeout: "{{ reboot_timeout }}"
        pre_reboot_delay: 10
        post_reboot_delay: 60
        test_command: uptime
      when: auto_reboot | bool
      tags: [reboot]

    # --------------------------------------------- post-reboot verification --
    - name: Capture reportPacsStatus immediately after reboot
      ansible.builtin.shell: |
        sudo -u admin /usr/local/tools/support/reportPacsStatus \
          > "{{ pacs_status_post_reboot_file }}" 2>&1
        {
          echo "=== reportPacsStatus (post-reboot) on $(date -Is) ==="
          cat "{{ pacs_status_post_reboot_file }}"
        } | tee -a "{{ log_file }}"
      args:
        executable: /bin/bash
      register: pacs_status_after_reboot
      changed_when: false
      failed_when: false
      tags: [verify]

    - name: Diff baseline vs post-reboot reportPacsStatus
      ansible.builtin.shell: |
        {
          echo "=== diff: pre-update baseline vs post-reboot on $(date -Is) ==="
          diff -u "{{ pacs_status_baseline_file }}" "{{ pacs_status_post_reboot_file }}" || true
        } | tee -a "{{ log_file }}"
      args:
        executable: /bin/bash
      register: pacs_diff_post_reboot
      changed_when: false
      failed_when: false
      tags: [verify]

    - name: Flag differences immediately after reboot
      ansible.builtin.debug:
        msg:
          - "*** PACS status differs from pre-update baseline immediately after reboot ***"
          - "{{ pacs_diff_post_reboot.stdout_lines | default([]) }}"
      when: pacs_diff_post_reboot.stdout | trim | length > 0
      tags: [verify]

    - name: Wait {{ post_reboot_settle_seconds // 60 }} minutes for services to settle
      ansible.builtin.pause:
        seconds: "{{ post_reboot_settle_seconds }}"
      tags: [verify]

    - name: Capture reportPacsStatus {{ post_reboot_settle_seconds // 60 }} minutes after reboot
      ansible.builtin.shell: |
        sudo -u admin /usr/local/tools/support/reportPacsStatus \
          > "{{ pacs_status_post_settle_file }}" 2>&1
        {
          echo "=== reportPacsStatus (+{{ post_reboot_settle_seconds // 60 }}min) on $(date -Is) ==="
          cat "{{ pacs_status_post_settle_file }}"
        } | tee -a "{{ log_file }}"
      args:
        executable: /bin/bash
      register: pacs_status_after_settle
      changed_when: false
      failed_when: false
      tags: [verify]

    - name: Diff baseline vs +{{ post_reboot_settle_seconds // 60 }}min reportPacsStatus
      ansible.builtin.shell: |
        {
          echo "=== diff: pre-update baseline vs +{{ post_reboot_settle_seconds // 60 }}min on $(date -Is) ==="
          diff -u "{{ pacs_status_baseline_file }}" "{{ pacs_status_post_settle_file }}" || true
        } | tee -a "{{ log_file }}"
      args:
        executable: /bin/bash
      register: pacs_diff_post_settle
      changed_when: false
      failed_when: false
      tags: [verify]

    - name: Flag differences {{ post_reboot_settle_seconds // 60 }} minutes after reboot
      ansible.builtin.debug:
        msg:
          - "*** PACS status STILL differs from pre-update baseline after {{ post_reboot_settle_seconds // 60 }} minutes ***"
          - "{{ pacs_diff_post_settle.stdout_lines | default([]) }}"
      when: pacs_diff_post_settle.stdout | trim | length > 0
      tags: [verify]

    - name: Run checkRestarts to confirm processes restarted cleanly
      ansible.builtin.shell: |
        {
          echo "=== checkRestarts on $(date -Is) ==="
          sudo -u admin /usr/local/tools/support/checkRestarts
        } 2>&1 | tee -a "{{ log_file }}"
      args:
        executable: /bin/bash
      register: check_restarts
      changed_when: false
      failed_when: false
      tags: [verify]

    - name: Determine whether PACS matches baseline and is otherwise healthy
      ansible.builtin.set_fact:
        pacs_diff_immediate: "{{ pacs_diff_post_reboot.stdout | trim | length > 0 }}"
        pacs_diff_after_settle: "{{ pacs_diff_post_settle.stdout | trim | length > 0 }}"
        pacs_ok: >-
          {{ (pacs_diff_post_settle.stdout | trim | length == 0)
             and (pacs_status_after_settle.rc == 0)
             and ('FAIL' not in (pacs_status_after_settle.stdout | upper))
             and ('ERROR' not in (pacs_status_after_settle.stdout | upper)) }}
      tags: [verify]

    # ------------------------------------------------------- recovery -------
    - name: Force-start PACS stack (recovery — only if status is not OK)
      ansible.builtin.shell: |
        set -e
        {
          echo "=== PACS recovery start on $(date -Is) ==="
          /etc/init.d/sybase -v start
          /etc/init.d/apache2 start
          /etc/init.d/postgres-intelerad start
          sudo -u admin controlTomcat -t start
          sudo -u admin /usr/local/tools/PACS start
          echo "=== PACS recovery start finished $(date -Is) ==="
        } 2>&1 | tee -a "{{ log_file }}"
      args:
        executable: /bin/bash
      when: not pacs_ok
      tags: [recover, verify]

    - name: Re-check reportPacsStatus after force-start
      ansible.builtin.shell: |
        sudo -u admin /usr/local/tools/support/reportPacsStatus 2>&1 | tee -a "{{ log_file }}"
      args:
        executable: /bin/bash
      register: pacs_status_recovery
      when: not pacs_ok
      changed_when: false
      failed_when: false
      tags: [recover, verify]

    - name: Final summary
      ansible.builtin.debug:
        msg:
          - "Host: {{ inventory_hostname }} ({{ intelerad_os_key }})"
          - "Log:  {{ log_file }}"
          - "Baseline:        {{ pacs_status_baseline_file }}"
          - "Post-reboot:     {{ pacs_status_post_reboot_file }}"
          - "Post-{{ post_reboot_settle_seconds // 60 }}min:      {{ pacs_status_post_settle_file }}"
          - "Excluded (never updated): {{ intelerad_excluded_packages | join(', ') }}"
          - "Differs immediately after reboot: {{ pacs_diff_immediate }}"
          - "Differs after {{ post_reboot_settle_seconds // 60 }}-minute settle: {{ pacs_diff_after_settle }}"
          - "PACS status OK after settle period: {{ pacs_ok }}"
          - "Recovery start required: {{ not pacs_ok }}"
          - "REMINDER: confirm with I.R that services are healthy."
      tags: [always]
